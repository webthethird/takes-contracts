[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
fs_permissions = [{ access = "read", path = "./" }]

[profile.default.fuzz]
runs = 256

[profile.default.invariant]
runs = 64
depth = 32
fail_on_revert = false

[rpc_endpoints]
base = "${BASE_RPC_URL}"
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"

[etherscan]
base = { key = "${BASESCAN_API_KEY}", chain = "base" }
base_sepolia = { key = "${BASESCAN_API_KEY}", chain = "base-sepolia" }
